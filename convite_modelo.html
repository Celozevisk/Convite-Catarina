<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" 
  content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>Convite Digital - Toy Story</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-text-size-adjust: 100%;
  }

  html, body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    font-family: Arial, sans-serif;
    background: #eaeaea;
  }

  body {
    overflow-x: hidden;
  }

.viewport {
  width: 100%;
  min-height: 100svh;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: max(16px, env(safe-area-inset-top))
           max(16px, env(safe-area-inset-right))
           max(16px, env(safe-area-inset-bottom))
           max(16px, env(safe-area-inset-left));
  background: #eaeaea;
}

.convite-scale {
  width: 100%;
  display: flex;
  justify-content: center;
}

.convite-palco {
  position: relative;
  width: min(100%, calc(100svh * 720 / 978));
  max-width: 720px;
  aspect-ratio: 720 / 978;
  overflow: hidden;
  background: transparent;
}

.fundo-palco {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.titulo-aniversario {
  position: absolute;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: 66%;
  height: auto;
  z-index: 3;
  display: block;
  user-select: none;
  pointer-events: none;
  -webkit-user-drag: none;
}

.conteudo-central {
  position: absolute;
  top: 36%;
  left: 50%;
  transform: translateX(-50%);
  width: 50%;
  min-height: 43%;
  padding: 4.5% 4% 5%;
  text-align: center;
  z-index: 2;
  color: #2c3e50;
  background: rgba(255, 255, 255, 0.10);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.chamada-aniversariante {
  width: 100%;
  margin-bottom: 8%;
}

.nome-convidado {
  font-size: clamp(20px, 4.8vw, 34px);
  font-weight: 700;
  color: #000;
  line-height: 1.12;
  margin: 0 0 12px 0;
}

.linha-menor {
  font-size: clamp(14px, 3.1vw, 22px);
  line-height: 1.35;
  font-weight: 600;
  margin: 0;
}

.info-festa {
  width: 110%;
  margin-bottom: 8%;
  color: #5d4037;
}

.info-item {
  font-size: clamp(12px, 2.0vw, 18px);
  margin: 8px 0;
  color: #5d4037;
}

.frase-final {
  margin-top: auto;
  
  font-size: clamp(18px, 4.2vw, 35px);

  font-style: italic;
  color: #3498db;
}

  #sound-toggle {
    position: fixed;
top: max(16px, env(safe-area-inset-top));
right: max(16px, env(safe-area-inset-right));
    z-index: 20;
    border: none;
border-radius: 12px;
    padding: 12px 16px;
    font-size: 12px;
    background: rgba(52, 152, 219, 0.92);
    color: #fff;
    cursor: pointer;
-webkit-appearance: none;
appearance: none;
  }

  #sound-toggle:active {
    transform: scale(0.98);
  }
</style>

</head>
<body>

  <button id="sound-toggle">🔊 Ativar Som</button>

  <div class="viewport">
    <div class="convite-scale" id="conviteScale">
      <div class="convite-palco">
        <img 
            class="fundo-palco" 
            src="https://raw.githubusercontent.com/Celozevisk/Convite-Catarina/main/fundo.jpeg" alt="fundo convite"
        >

        <img 
            class="titulo-aniversario" 
            src="https://raw.githubusercontent.com/Celozevisk/Convite-Catarina/main/logo_catarina_8_anos.png" alt="Catarina 8 anos"
        >

        <div class="conteudo-central">
          <div class="chamada-aniversariante">
            <div class="nome-convidado">Oi Emanuelly!</div>
            <div class="linha-menor">
              Você está convidada para a minha<br>
              festa de aniversário!
            </div>
          </div>

          <div class="info-festa">
            <div class="info-item">🗓️ <strong>Data:</strong> 30/05/2026</div>
            <div class="info-item">🕒 <strong>Horário:</strong> 15:00</div>
            <div class="info-item">📍 <strong>Local:</strong> Salão de Festas</div>
            <div class="info-item">Condomínio Reserva Urano</div>
          </div>

          <div class="frase-final">Ao infinito e além...</div>
        </div>
      </div>
    </div>
  </div>

  <audio id="musicaFundo" loop playsinline preload="auto" webkit-playsinline>
    <source src="https://raw.githubusercontent.com/Celozevisk/Convite-Catarina/main/toy-story-track.m4a" type="audio/mp4">
    <source src="https://raw.githubusercontent.com/Celozevisk/Convite-Catarina/main/toy-story.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <script>
const soundToggle = document.getElementById("sound-toggle");
const musica = document.getElementById("musicaFundo");

let tocando = false;
let fadeInterval = null;

musica.volume = 0.05;

function limparFade() {
  if (fadeInterval) {
    clearInterval(fadeInterval);
    fadeInterval = null;
  }
}

function iniciarFadeIn() {
  limparFade();
  fadeInterval = setInterval(() => {
    if (musica.volume < 0.75) {
      musica.volume = Math.min(musica.volume + 0.05, 0.8);
    } else {
      musica.volume = 0.8;
      limparFade();
    }
  }, 120);
}

function pausarAudio() {
  limparFade();
  fadeInterval = setInterval(() => {
    if (musica.volume > 0.05) {
      musica.volume = Math.max(musica.volume - 0.05, 0);
    } else {
      musica.volume = 0;
      musica.pause();
      tocando = false;
      soundToggle.textContent = "🔊 Ativar Som";
      limparFade();
    }
  }, 120);
}

function handleToggle() {
  if (tocando) {
    pausarAudio();
    return;
  }

  musica.muted = false;
  musica.volume = 0.05;

  // iOS Safari ignora preload="auto" para economizar dados.
  // Chamar load() dentro do gesto do usuário força o carregamento
  // antes do play(), evitando falha silenciosa no iOS.
  musica.load();

  const promise = musica.play();

  if (promise !== undefined) {
    promise
      .then(() => {
        tocando = true;
        soundToggle.textContent = "🔊 Pausar Som";
        iniciarFadeIn();
      })
      .catch((erro) => {
        tocando = false;
        soundToggle.textContent = "🔊 Ativar Som";
        console.error("Erro ao iniciar áudio:", erro);
      });
  } else {
    tocando = true;
    soundToggle.textContent = "🔊 Pausar Som";
    iniciarFadeIn();
  }
}

// CORREÇÃO iOS: usar "click" em todos os dispositivos.
// O touchend + e.preventDefault() impede o iOS Safari de reconhecer
// o gesto como válido para reprodução de mídia. O evento "click",
// disparado logo após o toque, é aceito corretamente pelo iOS.
soundToggle.addEventListener("click", handleToggle);
  </script>

</body>
</html>
